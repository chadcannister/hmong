    {
        "url": "vangkin_live\\wedding\\xeej_cawv_engl.htm",
        "description": "Xeej Cawv Tshooj, Wedding Ceremonial Drinks / Toasts This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. Please note this is a mockup draft & does not contain the complete information Rooj #1: Qheb Roog- Meaning: A toast – to open the door and welcome the daughter, son-in-law and family to the house. Poob Plaag- Meaning: A toast – acknowledging daughter, son-in-law and family that they are now inside the house. Txhij Qhua - Meaning: A toast – calling all roles in the wedding ceremony to be seated at the table. Suav Yaig - Meaning: A toast – to foresee both obstacles and blessings through the chicken feet, the tongue, and the eyes. These usually reveal signs of good health, happiness, and prosperity ahead. If there are any signs of obstacles, we ask to be removed, and only receive good blessings. Ntaus Dlaab - Meaning: A drink - to inform the ancestors that the daughter is entering into marriage. We ask for their acknowledgment, their guidance, and their blessings for her journey ahead. Paam Thaaj & Tshaab Thaaj – carry two important meanings. First meaning - this drink is to honor everyone present because at a large gathering such as a wedding, not everyone has the opportunity to sit at the table to drink the rounds. This drink is to ensure everyone gets a wedding drink. An expression of the family’s gratitude for everyone’s support. Second meaning - This drink is a gesture of respect from the groom, marked by his kneeling (pe). As the groom kneels and rises (pe), it symbolizes his acknowledgment of and deep respect for the bride’s family, for their love, support, and warm welcome into their lives. Most importantly, this gesture reflects his recognition of their cultural roots and traditions, honoring the ancestors whose guidance and protection continue to shape and bless both families. Rooj #2: Cawv Tshai – Meaning: A Toast - to say good morning and have breakfast together before the newlyweds go home. In traditional weddings, the ceremony often lasts the entire day due to multiple rounds of ceremonial drinks and rituals. Because the celebration typically continues late into the night, the bride’s family does not allow the newlyweds to leave. Instead, the couple stays overnight and departs the following morning after sharing breakfast with the family. Cawv Kawm Moo/ Nkaw Lug – Cawv zeem Meaning: A drink to remember each other after a short gathering and how to properly address each person in the family. Nkaw lug Meaning: a toast – where a representative speaks on behalf of the bride’s family to the groom’s family. On behalf of the bride’s family, we raise this drink to honor the union of our two families. With respect and sincerity, we entrust our daughter to your care, and we welcome you warmly into ours. May this shared drink carry our blessings, goodwill, and hopes for a harmonious and joyful future together. Cawv Cob Nraa - Meaning: A drink to ensure all items being brought to the bride’s house by the groom’s party must be taken back. This ceremonial drink serves to ensure that all items brought by the groom’s party to the bride’s home are properly acknowledged and accounted for. It symbolizes responsibility, respect, and careful stewardship of what is given. Any items brought into the home must also be taken back, but with an important condition—everything must be returned in double. For example, if two spoons are brought in, four spoons should be returned. What comes in is symbolically multiplied as it goes out, representing prosperity, generosity, and goodwill between the two families. In addition, the bride’s representative carries the responsibility of confirming that all provisions are sufficient to host the groom’s party. This includes ensuring there is enough food, utensils, knives, salt, and livestock such as chickens for everyone present. Overall, this ritual reflects mutual respect, abundance, and the strengthening of family ties through generosity and careful exchange Cawv Sawv Kev / Teem Tsum – the end of the ceremony Meaning: a drink to finalize the ceremony. This is the final drink of the wedding—a toast to say goodbye for now, and “we will see you again” as the daughter begins a new chapter of her life. In traditional weddings, at this moment, the Green Lady takes the bride’s hand and leads her away without looking back, symbolizing her transition from one life into another."

  function escapeRegex(text) {
    return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function countMatches(text, query) {
    const regex = new RegExp(escapeRegex(query), "gi");
    return (text.match(regex) || []).length;
  }

  function highlightText(text, query) {
    const regex = new RegExp(`(${escapeRegex(query)})`, "gi");
    return text.replace(regex, "<mark>$1</mark>");
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function getAllSnippets(text, query, maxWords = 40) {
    const escapedQuery = escapeRegex(query);
    const regex = new RegExp(escapedQuery, "gi");
    const snippets = [];
    let match;

    while ((match = regex.exec(text)) !== null) {
      const matchStart = match.index;
      const matchEnd = regex.lastIndex;

      const beforeText = text.slice(0, matchStart).trim();
      const matchText = text.slice(matchStart, matchEnd).trim();
      const afterText = text.slice(matchEnd).trim();

      const beforeWords = beforeText ? beforeText.split(/\s+/) : [];
      const matchWords = matchText ? matchText.split(/\s+/) : [];
      const afterWords = afterText ? afterText.split(/\s+/) : [];

      const remainingWords = Math.max(maxWords - matchWords.length, 0);
      const wordsBefore = Math.floor(remainingWords / 2);
      const wordsAfter = remainingWords - wordsBefore;

      const snippetParts = [
        ...beforeWords.slice(-wordsBefore),
        ...matchWords,
        ...afterWords.slice(0, wordsAfter)
      ];

      let snippet = snippetParts.join(" ");
      if (beforeWords.length > wordsBefore) snippet = " " + snippet;
      if (afterWords.length > wordsAfter) snippet += " ...";

      snippets.push(highlightText(escapeHtml(snippet), query));

      // Prevent infinite loops on unusual zero-length matches
      if (regex.lastIndex === matchStart) regex.lastIndex++;
    }

    return snippets;
  }

  function renderSnippets(item, query) {
    const descriptionSnippets = getAllSnippets(item.description, query);
    const urlSnippets = countMatches(item.url, query) > 0
      ? [`URL match: ${highlightText(escapeHtml(item.url), query)}`]
      : [];

    const allSnippets = [...urlSnippets, ...descriptionSnippets];

    if (allSnippets.length === 0) {
      return "";
    }

    return `
      <ol class="snippets">
        ${allSnippets.map(snippet => `<li>${snippet}</li>`).join("")}
      </ol>
    `;
  }

  function search(query) {

        const totalCount = descriptionCount + urlCount;

        return {
          ...item,
          matchCount: totalCount
        };
      })
      .filter(item => item.matchCount > 0);

    if (matches.length === 0) {
      resultsDiv.innerHTML =
        "<p class='no-results'>No results found.</p>";
      return;
    }

    resultsDiv.innerHTML = matches.map(item => `
      <div class="result">
        <a href="${item.url}">
          ${highlightText(item.url, query)}
        </a>

        <div class="match-count">
          Found ${item.matchCount} time${item.matchCount === 1 ? "" : "s"}
        </div>

        <div class="description">
          ${renderSnippets(item, query)}
        </div>
      </div>
    `).join("");
