 tsi pum qaab yuav zug yuav yuav koj lub dlaag lub zug coj (tug tub) puab nyuas moog xaus tshoob xaus kug, moog laaj nam laaj txiv yuav muab koj lub plhu txaj plhu ntsig moog ntaiv nub ntaiv hli moog tiv kev ab kev dlaw los thov koj ua sab quas ntev nawv. Has rua tug phis laaj) nub nua (tug txiv tsev) nwg tsaa nwg ncej tsev muaj tub nwg muab sev nwg txhawb nwg nqaaj nthaab muaj tub nwg muab nyaab. Nwg yuav tso nam ntaab moog ntsawj tsua nam muv moog ntsawj thoob tsi pum qaab yuav zug yuav yuav koj lub dlaag lub zug coj (tug tub) puab nyuas moog xaus tshoob xaus kug, moog laaj nam laaj txiv yuav muab koj lub plhu txaj plhu ntsig moog ntaiv nub ntaiv hli moog tiv kev ab kev dlaw los thov koj ua sab quas ntev nawv. Has rua ris nraa (Npe) nub nua (tug txiv tsev) nwg tsaa nwg ncej tsev muaj tub nwg muab sev nwg txhawb nwg nqaaj nthaab muaj tub nwg muab nyaab. Nwg yuav tso nam ntaab moog ntsawj tsua muv moo ntsawj thoob tsi pum qaab yuav zug yuav yuav koj lub dlaag lub zug coj (tug tub) puab nyuas moog xaus tshoob xaus kug, moog laaj nam laaj txiv yuav muab koj lub plhu txaj plhu ntsig moog ntaiv nub ntaiv hli moog tiv kev ab kev dlaw los thov koj ua sab quas ntev nawv. Has rua nam ua luag (nam txais ntsuab) (Npe) nub nua (tug txiv tsev) nwg tsaa nwg ncej tsev muaj tub nwg muab sev nwg txhawb nwg nqaaj nthaab muaj tub nwg muab nyaab. Nwg yuav tso nam ntaab moog ntsawj tsua nam muv moog ntsawj thoob tsi pum qaab yuav zug yuav yuav koj lub dlaag lub zug coj (tug tub) puab nyuas moog xaus tshoob xaus kug, moog laaj nam laaj txiv yuav muab koj lub plhu txaj plhu ntsig moog ntaiv nub ntaiv hli moog tiv kev ab kev dlaw los thov koj ua sab quas ntev nawv. Thaum yug has rua ib tug ib tug tag tes has ib zag rua taag nrho txhua 2 tug pib txiv tuam mej koob txug rua nam ua luag tes le maam pe. Rooj cawv sawv kev: Xeej 1. Tug cawv thov dlaag zug. 2. Tug cawv cob kaus. 3. Tug cawv sawv kev. 4. Tug cawv lawv rooj. Thaum haus tug cawv cob kaus tes muab lub kaus hab nyaj lug cob rua Txiv         "url": "vangkin_live\\common\\familyterms.htm",
        "description": "Proper Family Terms The images below were produced and is owned by Travis Gore Click on the image to view it in full size Male's side of the family tijlaug - Your older brother nugtij - Refers to all your male cousins older than you You also call your cousins who are older than you tij laug, whether 1st 2nd or 3rd cousins. If they are your generation (ib phaaj) and older then you, you call them tijlaug. You call their wife namtij. kwv - Your younger brother If your cousins are younger than you, then you just call them by their name ( No Formality ). You call their wife nam ntxawm . All of your sisters you call muam, reguardless of age. This term is also used to reference your female cousins. When your sisters or female cousin marry you call them nyaaj, followed by their name. Their husbands you call yawm yij followed by their name. puj nyaaj hab txiv kwj yij pujnyaaj - references all your married aunties txivkwj yij - references all your auntes's husbands Your kids call your sister's nyaaj followed by their name. Their husband's your kids call txiv kwj followed by their name. yawm laug - Your uncles that are older then your father You call their wife puj laug Your uncles younger then your father you call txiv ntxawm Their wife you call namntxawm. Your fathers's sisters you call nyaaj followed by their name and their husbands you call txiv kwj followed by their name. Your father's sisters kid's or your cousins from your aunt you call npaug followed by their name. Your grand father from your fathers side you call yawm His wife you call puj You call your grand kids xeeb ntxwv ntxhais kwv ntxhais tij ??? your cousins's daughter's ??????????? Your mothers brother you call txiv dlaab laug and his wife you call nam dlaab, Your mothers call call dlaab and tais dlaab ??????????? Wife's side Your Wife's father or your father in law you call yawm txiv His wife you call nam tais Your father in laws brothers you call them the same as if from the males side of the family. The younger brother and his wife you call txiv ntxawm and nam ntxawm His older brothers you call laug and puj laug Your wife's older sister you call tais laugand their husband you call txiv laug, follow the same pattern with her cousin's Your wife's younger sister you call tais hluas and their husband you call txiv hluas, follow the same pattern with her cousin's Your wife's brothers you call dlaab laug regardless of age, their wifes you call tais dlaab Grandfathers yawm - Your GrandFather yawm koob - Your Great Grandfather yawm suab - Your Great Great Grandfather Other phaaj - Same Generation phaum - Same Age neej tsaa - your in laws kwv tij - your relatives ????????? puj nyaaj txiv kwj yij ??????? your sister and her us"

        "url": "vangkin_live\\common\\table_placement.htm",
        "description": "proper way to setup the table The image below shows the positions of the table and people right before thanking (ua tsaug) the shaman, important people etc.. In the olden days the table always starts at the cov txus today this is the fireplace and ends at the qhov cub today this is the kitchen. (see image of old home). If you are standing at the head of the table the xwm kaab is to your left side and all the people who played an important role in the event that day for example the txiv neeb sits on the left side of the table. Since today's homes can be of any design, some homes don't even have a fireplace. Its more difficult to figure out how the table should be set up. Here are some of the things to remember when setting up the table. 1. If you are standing at the head of the table the xwm kaab should be on your left side. 1. If you are standing at the head of the table the important people should be seated to your left. 2. The table should be set up where you bow (npe) towards the xwm kaab. The important people sitting at the table, their backs should be toward the the xwm kaab. Below are some examples : This icon represents the important people at the event and their position at the table, example txiv neej, txiv mus etc.. This icon represents family members, friends, etc.. and their position at the table The image below shows the positions of the table and people right before thanking (ua tsaug) the shaman, important people etc.. Example 1 :This is the proper table setup if the Xwm Kaab is anywhere on the right wall Example 2 :This is the proper table setup if the Xwm Kaab is anywhere on the left wall Example 3 : Xwm Kaab is in another room, but you can only setup the table in the larger living room"

        "url": "vangkin_live\\common\\terms_def.htm",
        "description": "Terms & Definitions yeeb kum ceeb kuam Swm Ntawv Plooj Xov Txheej yeeb kum ceeb kuam These represent the gold ingots which were used as currency in ancient china. Swm Ntawv The paper money you cut up into patterns with the half circle chisel ( image here) Plooj Xov Txheej These are the individual sheets Tuaj Yom Tuaj Yom - When you move your hand forward and back, example when offer a drink to the deceased ntshuas ntawv ntshuas ntawv - A bushel of money paper. For example the paper money that the daugther carries to ua qhua. phig tsha phig tsha - is only the meat used to sawv thawv. It is given to the txiv qeej. It is the matching meat from the sawv thawv cows. The meat is the leanest part of the cow with no bones. Not ribs This is the meat the txiv qeej give to the people they asked to help has nkauj, ntau ruag, hab tsuab qeej tsaj ntag nub tsaj ntag nub - During a funeral, these are the cows others have contributed to help the funeral and family of the deceases nyuj ntag mo nyuj ntag mo - During the funeral these are the cows required cows for the job positions and use to sawv thawv paaj qeeg paaj qeeg - During a funeral these are the Verses used during the ncej xub qeeg event. Hab paaj qeeg rua cov tuaj ua qhua lug txai puab lub txaj lub tsiw zaaj nkauj zaaj nkauj - During a funeral these are the verses used when phig tsha"

        "url": "vangkin_live\\common\\traditional_house.htm",
        "description": "Title Traditional House structure Traditional Hmong home Front view Top view Many of our current rituals and practices are based on how our home in our native land was structures. For example how we set the table when we have a feastive event. Or how the body of a deceased is place during a funeral. Here is a drawing of that structure. Notes ... qhov txus is equivalent to our current house fireplace. qhov cub is equivalent to the stove or kitchen. both were used for cooking, the qhov txus is where the main dishes were prepared over a large fire. The front door is the qhov rooj taag, and is the primary entrance. Visitors Qhua only use the front door. The side door qhov rooj txuas is used for going to to feed the animals and similar tasks."

    {
        "url": "vangkin_live\\funeral\\1st_steps.htm",
        "description": "When someone passes, first steps Currently the process is to dress the deceased in the clothing that the person will be wearing permenantly for the entire funeral then play Zaaj Qeej Tsaa If the person passes away at a hospital and play the Qeej is not allowed. This can be done after the body is moved to a morge or before the start of a actual funeral. Reference Class Meeting on 10/06/22 (01. 1st steps, Zaaj Qeej Tsaa , Clothes & holding deceased)) Zaaj Qeej Tsaa It's best if one of the Son's on the deceased plays zaaj qeej tsaa. If no one in the immediate family knows how to play this song. Then make sure you hire someone to do it for you. If you don't pay the person to do this. It translates to the person gaining all of your parents blessing and good fortune. If there is a qeej inside the house, have the person playing the zaaj qeej tsaa use that qeej, inside of that person's qeej. It's best to keep a Qeej in the house Prepare a brand new \"white\" cloth for when it time to ntxuav koob hmoov during this zaaj qeej Hint : you pour a beer and can ask the person playing the qeej to tell you when this time is as well. Zaaj Qeej Tsaa is not needed if the deceased is a younger person with no children. But should be preformed for everyone who has kids no matter the age Asking someone to play Zaaj Qeej Tsaa Pull the person to sit at a table, pour only one cup of beer and remember to bow. ❮❮ Play pause ❯❯ Clothing and Dressing the Deceased Reference Class Meeting on 10/06/22 (03. Types of Funeral clothing, Dressing the Deceased))"
    },
    {
        "url": "vangkin_live\\funeral\\aub_plig.htm",
        "description": "Funeral - Aub Plig This happens at the burial site where two people take the dirt from the burial site back to the home. They dirt is placed under the bed of the deceased person. The person carrying the dirt must never look back. Only forward. The reason why we do this is so that the spirit (tej ntsuj tej plig) of all the people who come help bury the person find there way back home. It represents a path back home."
    },
    {
        "url": "vangkin_live\\funeral\\coffin_drum_poles.htm",
        "description": "Coffin, Drum & Poles When you place the coffin and drum remember that our \"Vang\" family places the head of the deceased on the left side. Peb ro taw noog nruag The drum is always on the side of the head As explained in \"16th Meeting - 05/26/2019\"- \"Coffin, deceased body and drum positioning at day of funeral, how to tie the drum\" You want to use the drum someone raised (nruag yug) not the drum someone made (nruag zoj). The raised one is usually one you can hit from both sides. The made one you can only hit on one side. When you barrow a drum from someone, remember that you are to never let it touch the floor. If you use the made drum, remember that the side that you hit must face the deceased person when you hang the drum, you are not to hang or let it touch the ncej cub. (See image below for reference) When borrowing the raised drum, Notes from Nyaj Tswb Neeb Play Cutting the meat for the drum Notes from Nyaj Tswb Neeb Play More details in meeting 17th Meeting - 06/23/2019, This drawing is a view of the front of the old hmong houses and shows how funerals where set up in the old days. For our Vang family we have to pay attention to how the feet head and drum is positioned. We use the same positioning when we have our funerals"
    },

        "description": "Cuab Tsaav Repeated Phrases ------- Repeated Phrase Luag Repeated Phrase Chim Repeated Phrases Txais Ntawg tshais, su, mo ------- Ntawg Zaaj qeej nce neeg ------- Part 1 Ntawg nce neeg Part 2 Ntawg tug Npua Tsaav Neeg ------- Part 1 Ntawg Npua Part 2 Ntawg Npua Part 3 Ntawg Npua Part 4 Ntawg Tsaj ------- Ntawg Tsaj Part 1 Ntawg Tsaj Part 2 Ntawg Tsaj Part 3 Qhua Txiwg ------- Qhua Txiwg - main phrase Qhua Txiwg - for the meat & rice Qhua Txiwg - for the noob ncoo Ntawg Ncej Xub qeeg ------- Ntawg Ncej Xub qeeg Part 1 Ntawg Ncej Xub qeeg Part 2 Ntawg Nyaj Ntawv ------- Qhua Txiwg - ntawg ntawv nyaj 2 Ntawg Zaaj Qeej nqug rooj ------- Ntawg Zaaj Qeej nqug rooj Part 1 Ntawg Zaaj Qeej nqug rooj Part 2 Ntawg Nyaj Ntawv ------- Ntawg Ntawv Part 1 Ntawg Ntawv Part 2 On the day of the burial \"Nub Zais/Saam Saab\" you will need to do perform these ------- Haw/Ntaus Plig ------- Haw/Ntaus Plig Part 1 tua neev ------- Ntawg sawv kev ------- Ntawg sawv kev Part 1 Ntawg sawv kev Part 2 qhas tom ntxaas ------- qhas tom ntxaas - khau qhas tom ntxaas - kauj ------- qhas tom ntxaas - su ------- qhas tom ntxaas - nyaj txhaj ------- qhas tom ntxaas - tsov tuaj cov ------- qhas tom ntxaas - dlej ------- Ua Qhua as Cuab Tsaav ------- Details of this postion is in our 01/08/23 class session This position makes sure and acknowledges that all items are received by the deceased person This postion is called different titles at different parts of the funeral and during the spirit release (tso plig) events. The title is cuab tsaav when ua plig paam (reference Meeting 01/08/23 section 01) This position is call \"Laig Dlaab\" when the deceased person is a child or a person who is not married This position is call \"Cuab Tsaav\" when the deceased person is married person or has been married This position is call \"Txiv tuam pes yob swm\" during the event ncej xub qeeg and when cwb qhua Some KEY Notes for this position Which every bottle of beer or wine you use, the remaining in the bottle is only used for the deceased person DO NOT pour any of it for any other purpose This position does not have a cow like the thawv so you don't need to worry about going to the cow butcher site. Always use your right hand only Hold the cup with the drink in your right hand when offering it to the deceassed person When you need to ntaus kuam can you temporily put the cup of drink into your left hand Use your right hand to ntaus kuam then use your right hand to grab the cup of drink again Always use the bottom of the Kuam and hit the coffin before say any phrases Where it says 3 txoj cawv. It means you need to pour a cup of beer/wind when you do this part. It is done 3 times and the deceased person must except it 3 times. Before moving onto the next phrase example : ib txog los txoj cawv, then ob txog los txoj cawv, then peb txog los txoj cawv If it says 7 or 9 txoj cawv then you do it to the number 7 or 9 Once you have completed all 3, 7 or 9 txoj cawv, you not longer need to hold the beer/wine Anytime you ntawg anything always inform the txiv qeej inform txiv qeej ❮❮ play pause ❯❯ referenece meeting 01/08/23 15. Always inform the txiv qeej when you finish ntawg anything Note : This position starts after the Taw Kev finishes what he needs to do and not before ------ Summary List ------ Pay close attention to when these events happen, these are when the cuab tsaav will need to perform a tasks These items are what you need to do in chronological order so don't do one before the next on the list Your tasks are in blue. the rest on the list are there for reference so you can follow the list of events and the order they happen Daily Tasks Ntawg Tshais On the first day, Use the npua neeg is possible Ntawg Su Ntawg Mo 1st day Tasks Taw Kev Qeej tu sav Ntawg Zaaj Qeej Nce Neeg Ntawg Npua Tsaav Neeg Daily and Randomly You do this whenever it is needed, thov muab tsaj Ntawg Tsaj Nub ua Qhua Qhua Txiwg - main phrase Qhua Txiwg - Ntawg Txaj Ntsiw (meat & rice) Qhua Txiwg - Ntawg Noob Ncoo Ntawg Ncej Xub Qeeg Ntawg Nyaj Ntawv round 1 Ntawg Zaaj Qeej Nqug Rooj Ntawg Nyaj Ntawv round 2 Day of the Burial Haw/Ntaus Plig Ntawg sawv kev At the Burial Site khau kauj Su Nyaj Txhag tsov tuaj cov dlej Ua Qhua as Cuab Tsaav tug kis & materials ------ End of Summary List ------ Except for \"Haw/Ntaus Plig\", These phases are repeated and used in all the of the times the deceased is \"chim\" or \"luag\" If both sides are fliped faced up(ob saab ntxeev) (Say Deceased Name) o tsib tim luag tav ► play puj yawm quas luas kaaj kev yoj leb ta ► play If both sides are fliped face down (ob saab khwb) (Say Deceased Name) o tsib tim chim ta ► play puj yawm quas luas kaaj kev yoj leb ta ► play If one side up (ib saab ntxeev), one side down (Ib saab khwb) means the person excepts it (txais lawm, leeg lawm) noj koj ib leeg noj haus koj ib leeg haus e noj tsi ► play taag ntim ruab raag haus tsi taag ntim ruab taub es noj tsi ► play taag coj moog puj pu pub yawm noj haus tsi taag coj moog puj pu pub yawm haus ta ► play On the first day : These are only done after \"Ntawg Npua Tsaav Neeg\". Never do any of these before \"Ntawg Npua Tsaav Neeg\" You want to use the npua neeg if possible for the first day You do these right before the food is about to be served for the guest 3 txoj cawv (Say Deceased Name) o ib txog los txoj cawv koj txais moog haus e yuav rau tshais rua koj noj Change the words depending if it's breakfast, lunch or dinner time ► play Flip the xyooj kuam (ntaus kuam), depending on the face you say either Repeated Phrase Luag or Repeated Phrase Chim or Repeated Phrases Txais You do this over and over till one side is facing up and one side is facing down (Txais Lawm). Then you are done. You need to do this before the txiv qeej can blow Zaaj qeej ce neeg 3 txoj cawv (Say Deceased Name) o ij txog los txoj cawv ► play koj txais moog haus e cov txiv qeej ► play yuav tshuab qeej tsaav neeg rua koj ta ► play Flip the xyooj kuam (ntaus kuam), d         "description": "Lwm Thawv / Tshwj Kaab recipes future topic This person's primary duty is to prepare the meat for all the meals. You will also be asked to begin the final ceremonies by drinking the first drinks, haus kaav xwm lub lug cawv. (Hum Xwm) Play This is what you say when you drink Play Hum Xwm explained Play If the Kaav Xwm ask the lwm thawv to \"lwm thawv nkuam qhov\" you will also have to preform these duties as well. Otherwise the Kaav Xwm will take care of these other duties. On the day \"ua qhua\" these two will receives all the paper money and give thanks. Txais xyaab txais ntawv, txais dlej txais cawv hab ua tsaug Sets the table when \"ua tsaug mo\" and the last table call rooj xwm. Keep in mind this person only sets the table, the kaav xwm normally set the drinks. Play For the \"ua tsaug mo\", once you the set the table you tell the Kaav Xwm that it is set. He normally will call the Kis to come sit. But he can also ask you the Lawm Thawj to do it as well. Play This is what you say when you call them to sit Play You will also be the one to \"Txeeb qhua nce rooj\". For the rooj xwm you will also need to bring the pig, get the cases of beer and pouring utilities. If kaav taw qhuav, then he will call everyone to the table if he does not you will need to do it, txhwj qhua lug nyob rooj, txheeb qhua nce rooj. Play Tip from Lug Pov, if the Kaav Xwm does not ask you to do all these things. Like lwm thawv nkuam qhov. Just concentrate on preparing the meals and thats about it. Play"

        "description": "Notes & Things to remember When the husband passed and you have the \"Cuag Laug\" when the wife passes you must also have this as well. If you do it for one you must do it for the other. As explained in \"16th Meeting - 05/26/2019\" section Sawv Thawv, animals, cuag When you barrow the drum (nruag yug) from someone to use for your families funeral. You must respect the drum. It must never touch the ground ( Explained in 16th Meeting - 05/26/2019, drum). The drum is handed down from father to the oldest son and is used for many of their family rituals not just funerals. You must respect this item like a family airlume. If you have the made drum (nruag zoj), remember that the side you hit must face the deceased person. Also very important is that you destroy the made drum after the funeral is over. If you don't then it signifies that you are about to bury another person in your family. Ua Caug Play explained in class 18 \"explains ua cuag\" Next Note"

    {
        "url": "vangkin_live\\funeral\\positions_from_instructor.htm",
        "description": "Original writeup from Lug Pov Kaab mob kev tuag hauv dlej hauv num. 1. Tug qhuab ke (Txiv Ncaws Kev) 2. Cuab Tsaav (Laig Dlaab) 3. Nam Txiv Dlaab 4. Txwj Laug (Hau Teb Hau Chaw) 5. Cuag Laug 6. Xov Txiv Dlaab 7. Thawj Thawv (Kaav Xwm) 8. Lwm Thawv (Tshwj Kaab) 9. Xaab Thawv (Txiv Txag) 10. Xwm Thawv (Nam Ua Mov) 11. Vwg Thawv 12. Luj Thawv 13. Txhij Thawv 14. Puaj Thawv 15. Caw Thawv 16. Txiv Qeej Txiv Nruag 17. Nam Dlaj Zeb Tuav Cug (Hov Paug Cug) 18. Tub Tshaaj Phaaj (Kaav Tsum) 19. Thawj Txiv Tsev 20. Thawj Nam Tsev 21. Tub Teev Ntawv 1. Tug Qhuab Ke(Taw Kev ) nuav tes thov leej twg los tau tsuav yog txawj xwb. 2. Tug Cuab Tsaav (Laig Dlaab) nuav mas yuav tsum yog tug kwv. Cov laug thaus u mas yuav tsum yog tug kwv nam txiv ib plaab yug ua xwb yog kawg tsi muaj tug kwv nam txiv ib plaab yug le lawm mas maam siv tug kem zog lug ua. Txheej nwg nuav tes pheej muab tug kem lug ua lawm xwb. Yog tug laug es muaj tsaj tua sawv thawv nua tes muab nwg hu ua Cuab Tsaav. Yog tej nyuas yau los yog tej hluas es tsi muaj tug tsaj tua sawv thawv nua tes muab nwg hu ua Tug Laig Dlaab. 3. Nam Txiv Dlaab mas yuav tsum yog tug nug nam txiv ib plaab yug xwb. Yog tsi muaj tug nam txiv ib plaab yug los siv tug kem zog xws le tij tub kwv tub los kuj tau hab. Yog cov kws muaj ob peb tug nam mas tej laug txuj kev ua mas luas tsuas feeb rua nam hlub cov neej tsaa xwb. Luas yeej tsi has txug nam yau cov le. Txawm has los luas yeej tsi kaam ua. Yog nam hlub cov neej tsaa feeb lug nua tes nam nraab, nam yau cov txhaj kaam ua xwb. Lub neej nwg nuav tes yog hu nam hlub tug ua Nam Txiv Dlaab lawm tes ca le hu Nam Yau tug ua Kaav Xwm lawm xwb. Yog tug quas yawg tuag nua tes yuav tsum hu nam hlub tug nug tuaj ua Nam Txiv Dlaab, hu nam yau tug tuaj ua Kaav Xwm. Yog ob tug nam tuag nua tes leej twg tuag hu leej twg tug nug tuaj ua Nam Txiv Dlaab. 4. Tug Txwj Laug mas yuav tsum yog tug hau teb hau chaw (tug nom tswv kws nyob lub zej lub zog los yog nyob lub teb chaws ntawd) los yog tug txheeb kwv tij kwv npawg kws paub taab muaj kev sib hlub sib paab thaum tseem ua neej nyob. 5. Tug Cuag tes yog tug vauv txiv. Thaus u tej laug tes yog tug nam tuag tes hu tug vauv hlub txiv tuaj ua tug cuag (los yog tug vauv hlub txiv tsi nyob lawm tes ca le hu ncaaj qhaa kom tug vauv tuaj ua tug cuag). Yog tug Txiv tuag tes hu tug vauv Ntxawg Txiv tuaj ua tug cuag. Lub neej nwg nuav tes muab pauv lawm. Nam tuag tes hu tug vauv Ntxawg tuaj ua tug cuag. Txiv tuag tes hu tug vauv hlub tuaj ua tug cuag lawm. Tej nuav yog tuaj pauv teb chaws MesKas nuav xwb. 6. Xov Txiv Dlaab tes yog cov tub nyaab le nug yog cov kws tuaj ua. Feem ntau tej laug coj tes yog txiv tseem nyob tes peb hu nwg kuas peb tsi kom tuaj ua cuag nyaab tab si kom tuaj ua Xov Txiv Dlaab. Nwg ua los tau huas nwg muab rua nwg tug tub ua los tau. Tag mas Xov Txiv Dlaab tes yuav tsum yog tug nug ua xwb. Cuag nyaab tes yog leej txiv ua xwb. 7. Thawj Thawv (Kaav Xwm) yog 2 tug. Ib tug yog tog kwv tij tug. Ib tug yog tog neej tsaa tug. Ob tug nuav yog ob tug kws lug dlha ib puas tsaav yaam huv lub nteeg. Ob tug nuav yuav tsum yog tug tuab neeg kws paub. Tshwj xeeb yog tug Kaav Xwm tog Kwv Tij. 8. Lwm Thawv (Tshwj Kaab) yog ob tug ua zaub. Ib tug yog tog kwv tij. Ib tug yog muab tug yawm yij hlub lug ua. Cov laug thaus u mas muab tug txheeb txheeb lug ua xwb. Nwg nuav tes muab tug kem lug ua lawm xwb. 9. Xaab Thawv (Txiv Txag) yog ob tug kws yuav tau moog ntuv ntoo ua txag rua tug tuag. Ib tug yog tog kwv tij. Ib tug tes yog tug yawm yij thib ob. Yog tsi muaj nua tes maam siv tug kem zog xws les tug yawm laug tug vauv los si yog tug txiv ntxawm tug vauv. 10. Xwm Thawv (Nam Ua Mov) yog ob tug kws ua mov rua lub nteeg ntawd. Ib tug yog tog kwv tij. Ib tug tes yog tug yawm yij yau. Yog tsi muaj tug koom nam koom txiv tes siv tug yawm yij kws kem zog los tau. Txheej nwg nuav tes yeej siv tug kem lawm xwb. 11. Tug Vwg Thawv, Luj Thawv, Txhij Thawv, Puaj Thawv, Caw Thawv nuav tes nyob ntawm saib ob tug Kaav Xwm kom ua dlaab tsi xwb. 16. Txiv Qeej. Yog miv nyuas yau tes thov 2 tug txiv qeej. Yaav ntuj thaus u tes yog ib tug quas laug tuag tes thov 3 tug Txiv Qeej. Ib tug yog txiv qeej huv tsev, ib tug yog txiv qeej neej tsaa, tug thib 3 tes thov leej twg los tau. Lub neej nwg nuav tes feem ntau thov 4 tug txiv qeej lawm xwb. 17. Nam Dlaj Zeb Tuav Cug( Hov Paug Cug) yog tug kws yuav tua tuav ntsab coj lug ua mov. Nwg nuav tsi siv lawm vim peb muab ntsab lug ua mov lawm. 18. Tub Tshaaj Phaaj (Kaav Tsum) yog tug tuab neeg kws thov lug saib lub tsum mov tsaam muaj tsaj lug phoom. Nwg nuav tsi siv lawm. 19. Thawj Txiv Tsev yog tug kws lug txais tog kwv tij neej tsaa hab lug paab saib tej khoom kws yuav siv rua lub nteeg los yog kom ccov tub xyom cuab moog yuav tej khoom kws yuav siv. 20. Tug thawj Nam Tsev yog tug kws lug coj kev paab saib kev noj haus hab khoom txom ncauj los yog paab cov nam ua mov. 21. Cov tub teev ntawv yog cov kws lug sau ntaub ntawv khaws tej kwv tij neej tsaa tej txaj ntsig tseg. Kev thov cov hauv dlej hauv num: Yaav ntuj thau u mas yuav tsum tau coj dlej cawv moog thov txhua tug hauv dlej hauv num huv luas lub vaaj lub tsev. Nwg nuav tes feem ntau siv lub tes les foos hu lawm xwb. Txawm siv lub foos hu los yug tseem has rua tug tuab neeg ntawd tas yug yuav moog thov nwg tom tsev. Feem ntau suav dlawg yeej tsi yuav cai le tej laug thaus u lawm tes yog ua tau tes ca le leeg huv lub xuv tooj xwb. Thaum hu moog rua tug tuab neeg kws yug thov ntawd tes has le nuav: Koj nyob tsev nua tes kuv tuaj tom koj tsev kod tuaj nrug koj thaam ib plag. Thaum nuav tug tuab neeg ntawd yuav nug saib koj yuav moog thaam dlaab tsi. Koj maam qha rua nwg paub qhov koj yuav moog nrug nwg thaam. Moog thov dlaag zug. Yog nwg tsi kaam tes koj ca le thov nwg huv foos xwb. Yog le tes has le nuav nawv yog koj tsi xaav le caag los kuv txawm tuaj tsi txug huv vaaj huv tsev tuaj has koj ib lus ols koj txhob xaav le caag nawv. Yeeb vim ntuj txiv tsi nqug teg ntuj nam nqug taw es p     },

        "url": "vangkin_live\\healing\\neeb_types.htm",
        "description": "The types of Neeb Other types of Neeb Short cut links neeb yaws cua When you ask a shaman to look and see if they can find anything wrong or anything unsually bad. Some situations when you would do this . . . 1. Someone is really sick and you think something is wrong. 2. You have a really really bad dream and think it may bring bad luck or its telling you something really bad is about to happen 3. It's just been a very long time and you or your family have just had a string of bad luck, or have had many many bad situations You don't normally need any animals or do a full ritual table with food and drinks for this type of Neeb The ritual that is perfomed to cure spiritual illnesses, among other things. Some situations where this ritual is performed. 1. The Shaman Ua Neeb saib and found something that needs to be corrected. 2. Your spouse/parents/children/etc.. feel its been a long time and just wants to do one to help cure you of any illness etc.... The shaman will normally tell you what is needed, either a pig/cow/goat/etc.. as well as other needed items You must also setup a table at the end of the event to thank the Shaman and those who came to aid in completing this ritual. A ritual in which the head of the household performs to call back all the spirits of his household to gather all family members back home. This should include all his sons and the wife along with their children. Any grand sons and great grand sons and son on. As well as all his unmarried daughters. This should not include any daughters who are offcially married. When a daughter is officually married they are seen as having spiritual claimed by their husbands family. This is also true for grand daughter as well and so on. Technically all the family members should be there at the ritual, but now days if someone absolutely can not make it. The person is many times substituted with his or her shirt. The items needed for this ritual is usually one hen and one roster (Perferrably one that has started to crow), one egg and one pig. However the shaman may change or need other items The two chickens and egg is used to hu plig for the family, the pig is used to Kaab the family together You must also setup a table at the end of the event to thank the Shaman and those who came to aid in completing this ritual. This ritual is usually performed when a spirit is detected in your house and must be rid of it. The term used when something like this is found is called muaj cua or tsev tsaus Most of the time the spirit is the cause of some illness to someone who lives in the house. The shaman will perform the ritual in which he will capture the spirit and place it into the materials you have gathered . The materials are pob zeb and pob caa During the ritual you will be the one to lock the spirite into the materials and muab teem tom lub hauv taag (This location is under the xwm kaab) This process is called teem cua He will then come back to perform the ritual which gets rid of the ritual Once the shaman has teem cua and the sick person gets well, you should perform this ritual as soon as possible. Because once you teem tug cua you don't want anyone touching it. If for example some person accidental moved the rock, the person who was sick has been known to just past away. This is because the spirit has broken free and it is angrier then before thus will probably cause more damage to the family, especially to the one it effected the first time. Items that are needed for this neeb are 1. moov pas 2. One Dog dlev or Goat tshis 3. Some shamans may require a sword (black stripped) 3. Depending on the shaman, he or she may ask for more items People needed to perfrom the ritual Note: depending on the txiv/nam neeb, some positions are used and some are not. 1. Txiv/Nam Neeb 2. Tug Saib Neeb 3. Tug Yaws Cua 4. Person to phoo moov pas Some txiv neeb do this part, some have another person do it. Varies based on the txiv neeb and how they do it. 5. ntaus pob kaws 6. Person to use the tsaub tsiw to plawm tsev 7. xuas ntaaj 8. Person caab dlev 9 ntaus ntsuag (drum) 10. Person to blow the water tshuag dlej During the ritual you will plawm the house till the shaman nthe, then you will lead everthing out to complete the ritual. You must also setup a table at the end of the event to thank the Shaman and those who came to aid in completing this ritual. 5. Ua Neeb Faab Nyeej A shaman will say a person muaj nyeej if the person consistantly keeps on getting sick month after month, year after year. The person gets better but a few days, months later the person is sick again. Normally when a shaman performs the ritual to fix the nyeej the also perform the ritual to khu Items that are needed for this neeb are 1. one bucket of water ( How big is the bucket ?????) 2. pig must be small and live 3. two ladders hand made of wood, one used outside and one used inside. Some shamans want one that is 7 steps and one 9 steps, Others may want one that is 6 steps and one that is 7 steps. In the old days these ladders needed to be strong enough to step on. But today we make a very miniture version about the size of your hand to full fill the requirement. When the ritual begins the ladder with the most steps start outside and the shorter one is inside, later this is switched and the shorter one is removed from the ritual completely. When the ritual is to the point where the person steps over the ladder the pigs head is turned toward the outside, when the shaman nthe, then you must cut the pig from the mid section and cut the pig in half all the way through. Then you Play Sound In the old days after the pig is cut in half the Play Sound 6. Ua Neeb Tswm Txhoj A person has this because they keep getting sick and a shaman ua neeb saib and found that the person have a txhoj. The meaing behind txhoj is when someone's spirit has found a grave hole and their spirit is caught there or is resting there. Thus causing them to continuously get sick. You must perform this ritual in order to release their spirit in order for the person to get well again. When you ua neeb tswm txhoj you must also ua neeb khu before you can tswm txhoj. Items that are needed for this neeb are 1. two maj zeeg Paper Person ?????? 2. Pig for the ua neeb khu part 3. A rock Some txiv neeb will ntaus kuam ( Flipping of cow horns ) Some will not and ask another person to perform this part. If you are asked to ntaus kuam you will go around the yard and flip the cow horns till a spot leeg meaning they are facing opposite sides or one is flipped facing up and one is facing down. If both horns are either both facing down or facing up, it means its the wrong spot Both sides facing down means, chim tsua koj Both side facing up means luag koj One side facing up and one side facing down means it excepts or is correct. Once you have found the spot you will then dig a triangle hole (mini grave), then you will put the maj zeeg into this hole. When the shaman reaches a specific part of the neeb ritual you will raise the maj zeeg from the hole. Then you will burn some paper to the persons Qhua neeb Qhua Yaig. Next you take the 2nd maj zeeg and place it into the hole. Basically putting a dummy to replace of the person you raised. Once the shaman reaches a special part of the ritual you will use the rock to press down on the maj zeeg and hole then fill it back up with dirt. Other Notes . . . . Some shamans perform the neeb khu with tswm txhoj and faab nyeej all together. Some will perform the neeb khu with only the tswm txhoj Or neeb khu with only faab nyeej. 7. Ua Neeb Thab Qhauv Work in Progress . . . . Propose of this neeb? was someone sick? Items that are needed for this neeb are 1. One pair of new clothes 2. One small table with apropriate foods 3. two freshly killed chicken When the txiv neeb, ua neeb reaches to a specific part of the neeb, you grab the person or persons (In this example your mother and father) and have them sit down at the table. Then you serv         "description": "Pauj Nam Nkaum Txiv Xaa Items needed to preform this ritual Ritual process Phrase, verse said to perform the ritual Ua thaaj neeb nqug qhua Nam Nkawm Txiv Xaa Looj Koov Nam Nkaum Txiv Xaa - Are the two spirits that send your children to you when you bare kids. When you have your child and they are consistantly sick or if they keep crying it is believed that it is because of these two spirits (history and description in 17th Meeting - 06/23/2019, pauj nam nkawm txiv xaa) You are also suppose to perform this ritual when your child is ones year old and you do the ceremony to receive your adult name, and Hu plig for your child. The process 1. Hu Plig 2. pauj nam nkawm txiv xaav These two rituals are their own indidual item with seperate plates and items. Don't mix the two. 3. Then you can also Xaiv Npe during the same event In the olden days Once you have a child you must hu plig and pauj nam nkawm txiv xaa within 3 days of your childs birth. Then exactly within one year you must hu plig again. 1 roster, (must be a roster) 4 cups of alcohol 1 Tawb xyaab lwj also called Tawb muag lom 4 little square money papter, plaub swm ntawv 4 paper money cutted to pattern, plaub plooj xov txheej 4 rice patties, plaub lub yeej khum ceej khum bring all your items to the door and hu nam nkauj txiv xaa (with Live Chicken) Then you kill the chicken and proceed to the next step which is to pauj Then you call them to leeg Then you cob to them Then you burn the incense and paper money to them Play full verse Main Point Ntau Kuam Need to ask for more details on completing this process Play If you are a txiv neeb and you have a child or and grandchild and they will live your you. You must ua thaaj neeb nqug qhua. (explained in 17th Meeting - 06/23/2019, thaaj neeb nqug qhua) Sometimes when a child is for example always sad, sick, edgy. A shaman my say it is because of nam nkawm txiv xaa looj koov. Meaning the two spirits may have come back to check up on the child and touched him/her because you as the parent may have been to harsh to the child. In this case you will need to preform the ritual above (same as pauj), but this time to Pauj leeg txhug. (explained in 17th Meeting - 06/23/2019, Nam Nkawm Txiv Xaa Looj Koov)"

        "description": "Hu Plig Hu Plig 2nd time This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. Place some eggs, raw rice, one candle and three burning incense in a plate next to the live chickens You want the chicken to face toward the door You will use one rooster and two hens because one roster and hen is used to Hu Plig one hen is to hu plig qoob plig loo, plig nyaj plig kub, plig tsaj plig txhuv Reminder, You hu plig two times, once with live chicken, 2nd time after with cooked chicken If you want to, you can also hu plig every morning for the full three days. You go outside with three incense to do this since you already done it with the chickens. This is to make sure everyone heard you call them to come home. Note : when you call them, ie... when you say words like \"ca les lug\" you need to use the kuam to tap the door. So they hear you call them to come home. Au nub nua tsuas zoo nub, nub nua tsuas zoo nyoog Play xyoo laug taag xyoo tshab tawm tuaj lawm tes kuv yuav hu Play kuv ib tsev nam tub txiv quas nyuas cuaj tsib kaum rau leej cuab tsib kaum rau tug Play tug hlub coj tug yau tug laug coj tug hluas tug ntsuj dluab ntsuj laug Play nyuj raag caab lis kau ca le lug noj tsab noj txu noj nqaj noj no noj qab noj qai Play Suav dlawg ca le lug au, ca le lug Play lug plawg rua nruab vaaj lug hlo rua nruab tsev Yuav lug nyob ua ib txoog Play ib qais, ib vaaj ib tsev ca les lug Play Ib xyoo ntuj quas zeeg es, xyoo laug xaus xyoo tshab tawm tuaj lawm es muaj tug Play tug ntsuj dluab ntsuj laug moog ywj kab ywj loog moog poob rua rooj noj rooj haus Play rooj ntaub rooj ntawv moog poob rua nruab kab nruab khw nruab maab nruab suav, Play poob rua sau kev neej kev tsaav lawm los txug tsab peb caug mo ntuj tuaj lawm es kuv hu tes ca le lug Play txiv lug tes txiv coj nam, nam lug tes nam coj miv tub miv nyuas Play coj plig tub plig kis plig nyaj plig kub plig qoob plig loo plig tsaj plig txhuv, plig maaj plig nt ckens are facing out the door Then you hu plig again, exactly like the first time. Remember to turn the chickens toward the inside of the house before you flip the horns (ntaus kuam) for the last time on the verse."

        "url": "vangkin_live\\notes\\need2doc\\my_txum_mej_experience.htm",
        "description": "Notes form my experience as Txum Mej for Laug Tshaav Txhaj's daughter Ntxawm When receiving the cigarettes txum mej huv tsev beer types (xeej cawv) Vauv hab Phis Laaj Npe My Notes This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. The price and bargaining was completed prior and I was only asked to come and full fill the position the day of the wedding Note : Be aware that weddings do not have a set format or order and will most likely change as the wedding goes on. Each wedding I attended has been a bit different from the previous. When receiving the cigarettes This is called nruab yeeb When the txiv tuam mej koob hands you the cigarette you say the following phrase. When you say this you put your hands together and wave forward like you would ua tsaug, BUT you don't wave to the person or to the front of you. You want to wave to the side. Siv txhaj o Play hand wave As the person in the txum mej koob position you should also nruab yeeb back to them (What do you say????) The very first table is just for eating, before the actual wedding begins. When the table is set you call everyone to come eat especially all the in-laws (Qhua). Ask them who else came and invite them as well. Sitting Usually the Txum Mej will be seated between the Tuam Mej and qhua vauv. I have seen where the Txum Mej is seated across the table opposite the Tuam Mej. See the sections on sitting for more details ??? You say nce tsum (this is after everyone eats and they reset the table to drink) What is this????) beer types (xeej cawv) Two people are asked to sit at the front of the table to regulate the types of beer cups that will be drank (chi cawv) In some cases, two people are not asked to sit and regulate the cups. So as the txum mej you will be the one to decide which cups to drink See the section on wedding beer types for more details Before you drink each xeej cawv, ua tsaug first. You do this when the xeej cawv reaches you. Has rua koj txiv tuam mej koob, qhua vauv, qhua phis laaj, ris nraa, nam txais ntsuab, mej ntsug haus nam txiv tug nuas cawv (Cawv npe) Play Then tuab txum yim Play Then you say Txiv tuam mej koob us tsaug ov, tas nam txiv tom u tsi cas le, nam txiv tom u ua neej xwm luas neeg e Play Rauv tawg luj lag ceeb cig nto ntseej Play e ua neej xwm luas, cawv rauv tawg luj lag ceeb cig nto tsuag e Play nam txiv tom u luas tas ua xeej qhua xeej ua xwm qhua xwm es Play nam txiv tom nua nyob tsawg noj tsawg haus xwb e ua nam txiv tom u tsaug Play Full Verse Version 2First repeat the 1st line of version 1 Ua tsaug ov txiv tuam mej koob, tas nam txiv tom u Play tes muab ruj rau nyog ruj muab neev rau nyog neev es Play muab ruj rua nyog ruj, coj yoog nyog lej lwg rhwv mim quas caag quas kug txuj Play muab neev rau nyog neej, coj yoog nyog lej lwg rhwv mim quas caag quas kug peev Play nam txiv tom u luas tas ua xeej qhua xeej ua xwm qhua xwm es Play nam txiv tom nua nyob tsawg noj tsawg haus xwb e ua nam txiv tom u tsaug Play Full Verse play The txiv tuam mej koob is suppose to say all your relatives and the two will respect-bow All you have to say is xob ua tsaug ov tau lawm ov Of you can say something like o nam ncoo txiv puab txiv ncoo nam pu es nam noog txiv qhuab txiv noog nam hu nawv Play first time is when they first arrive: npe kev dlaab kev qhua next when the event reaches : lug pum nam pum txwv This is when the txum mej is involved last time is when they are leaving: npe kev sawv kev ???? They will respect-bow to each person in the daughters family, all the daughters grand parents, including 2 and 4 grandfathers. Then the general family (terms that cover a group of family members, details below), the txum mej and tuam mej will be standing next to them and the tuam mej will tell them who to respect-bow to. In some cases the tuam mej will pour two beers and ask the txem mej to preform this part for the specific family members. He will also then give the txem mej         "description": "Thov Ua Neeb This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. Asking a shaman to preform the healing ritual, moog thov ua neeb You go to the shaman's house with nine incense (thaaj xyaab) wrapped with three sheets of paper money (?? Big ones or small ones ??) and you just asking him ( thov ) to perform the ritual to fix whoever. Explain to the him what you would like done. Asking the shaman saab saab koj tab swm thov koj paab ua ib thaaj neeb khu ku (person your trying to heal), thov koj nawb (Pes (Bow once)) You bow once after you have asked him/her ( thov ) If he agrees to perform the ritual then you light the nine incense into his thaaj neeb before you can bring his shaman material (ntsuag neeg, rooj neeg) with you to your house. sau tug txiv neej cov twj neeb The three paper you do not burn you just put them on the thaaj In some cases they will tell you they will bring their shaman material on the day of. Make sure to ask him what he would prefer. In this case do you still burn the incense??? When the neej is complete and you send the shamans materal back to his home. First thing you do is put whatever materail he has nicely on the thaaj, then you once again light nine more incense and place them on the thaaj neej, indicating that hab tas luas tau yeej tau tshuab, luas tsov qaab lug nyob luas qhov chaw You are suppose to burn the incense to indicate that they the leaving the house when you first take the shamans material, then you burn them again when you bring them back to indicate that they are back home. ???Placement of the incense. You put 3 in the middle and two to each side, then you place two on the side THis is food for the dlaab qhua YOu want to kib a little and throw them away so that the bad spirits follow that batch. Then you make more for the txiv neej cov dlaab qhua. When you throw away the first batch you say \"swm saib paaj moov puas tawg\". CUtting the pig for the txiv neej ?????For use we cut three ribs with the leg and the head, and we put the tail into the mouth of the pig????? which side of the pig????? Other txiv neej may want exactly 3 or 4 ribs (Person's name), saab saab koj le kuas thov koj tuaj khu kuv nam tub txis nyua, may also explain what you are asking to heal. thov koj nawb (Pes (Bow)) thov qhua num qhua tswv neb nag neeb txi qhua txi qhua laug, cuaj paj neeb xwm, yim paj neeb laug, cuaj paj txiv zej, yim paj txiv kooj, suav quav dlawg nawb (Pes (Bow) twice) Khwv txug koj sav os (Person's name), (Pes (Bow)) Khwv qhua num qhua tswv neb nag neeb txi qhua txi qhua laug, cuaj paj neeb xwm, yim paj neeb laug, suav quav dlawg naws (Pes (Bow) twice) Ua tsaug (Person's name) nub nua lawv koj ntauj nce ntauj nqeg tuaj ua neeb khu kuv nam tub txis nyua noj qaab nyob zoo, peb caus tug ntxuag tsuab saub rooj lug ua koj ib lug tsaug los tsis muaj le Tsuab muaj ib lub rooj qhuav tuaj lwv koj xws, es ua koj tsaug os. (Pes (Bow) ) Ua qhua num qhua tswv neb nag neeb txi qhua txi qhua laug, cuaj paj neeb xwm, yim paj neeb laug, cuaj paj txiv zej, yim paj txiv kooj, suav quav dlawg tsuag os (Pes (Bow)) Ua tsaug (Person's name) nub nua koj tuaj paab saij neeb khu kuv nam tub txis nyua noj qaab nyob zoo, tsis muab tug ntxuag tsuab saub rooj lug ua koj tsaug los ua koj tsaug nawd. Ua tsaug tsuab cob neej cob tsaav cob kwv cob tij cob nyob cob dlej nyob ze, mej taag tshov, mej swm mej sij hawm tuaj paab dlev paab cawj paab zug paab num, e thaaj neeb nuas txaj taj The little tin can or cup where you place the incense into is called the thawj xyaab lwj"

    {
        "url": "vangkin_live\\notes\\need2doc\\tu_sub.htm",
        "description": "Tu Sub process This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. 1. red and white strings 2. a piece of black cloth (you will burn this so use ones that can burn. Use cotton and not plastic ) 3. Gather all the tools you used the previous year like (knives, ax, shovels, etc...) 4. The plant we used to brush your home with is call pampas grass (tauj). When fully bloom. The flowers of this plant can be different colors. You will need three stems from this plant or you can substitute it with lemon grass if you don't have this plant. But it must be long and the leafs must extend out. twine the black cloth into a rope Use this to tie the three grass plants together, tie it in the middle. Also tie one red and white string to the grass plant as well. You will then light the black cloth on fire (Make sure you don't light the red and white strings) Once it is lite you will use it to brush the house (cheb tsev) Before lighting it on fire Put your used tools like knives shovels under the Xwm Kaab Have each of your family members stand in the living room and put one piece of white string and one piece of red simple on their head Now light the black cloth and brushed the house This is what you say You can substitute cheb with lwm nub nua kuj tsi yog chem plig nam plig txiv, plig tub plig ki, tsi yog cheb plig nyaj plig kub plig, qoob plig loo kuv tsi yog cheb plig tsaj plig txhuv, plig maaj plig ntuag nuv nua mas kuv yuav cheb tug sub tawg tug sub ntshaa sub kua muag ab kua muag dlaw cheb tug sub moog tsaug teg tug sub moog tsaug taw nuv nua mas kuv yuav cheb mob cheb ntsaaj cheb swv cheb npus cheb khawv yaaj khawv yug khawv txiv khawv kus tais fuas les nyaa kuv yuav cheb tug sub sis ntaus tug sub sis tshev, tug sub kev phem tug sub kev tsis zoo kuv yuav cheb kev mob cheb kev nkeeg cheb moog rua suav tawg rua suav tawg kub cheb rua dlej tshoob, es dlej tshoob moog poog lawm zaaj qhov quas ntsej tsi nov, muag xov pum kuas kuv ib tsev nam tub txiv quas nyuas cuaj tsib kaum rau leej cuab tsib kaum rau tug, noj qaab nyob zoo nyob tsi muaj mob tsi muaj nkeeg, tsi muaj plaub tsi muaj ntug tsi muaj xaiv muaj lug nyob yim nyob xua nyob kaaj nyob huv nyob dlawb nyob zoo nub nua kuj tsi yog chem plig nam plig txiv, plig tub plig ki, tsi yog cheb plig nyaj plig kub plig, qoob plig loo tsi yog cheb plig tsaj plig txhuv, plig maaj plig ntuag Play nuv nua mas kuv yuav cheb tug sub tawg tug sub ntshaa sub kua muag ab kua muag dlaw Play cheb rua khauv pis leg, cheb tug sub moog tsaug teg tug sub moog tsaug taw Play cheb tug sub sis ntaus sis tshev, tug sub kev phem tug sub kev tsis zoo Play nuv nua mas kuv yuav cheb mob cheb ntsaaj cheb swv cheb npus cheb khawv yaaj khawv yug khawv txiv khawv kus Play tais fuas les nyaa, kua muag ab kua muag dlaw Play cheb moog rua nub coog hli kawg Play cheb moog rua suav tawg rua suav tawg kub, cheb rua dlej tshoob Play es dlej tshoob moog poog lawm zaaj qhov, quas ntsej tsi nov, muag xov pum Play cheb rua ntsuab roob quas ntoo luv ntoo voob, cheb rua ntsuab dlawg quas ntoo luv ntoo txhaw Play kuas kuv ib tsev nam tub txiv quas nyuas cuaj tsib kaum rau leej cuab tsib kaum rau tug, noj qaab nyob zoo Play nyob tsi muaj mob tsi muaj nkeeg, tsi muaj plaub tsi muaj ntug tsi muaj xaiv muaj lug Play nyob yim nyob xua nyob kaaj nyob huv nyob dlawb nyob zoo Another version Play Once you finished brushing the house, you take the strings from each person's head and put them all together and get them ready to ship to the person's house, where the family will tu sub this year."

        "url": "vangkin_live\\notes\\need2doc\\ua_ntxhais_ua_vauv.htm",
        "description": "This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. ua qhua saib neeg laug nce hauv toj - ua ntxhais ua vauv Items needed for the event. 2 bottled drinks, can be ginger ale, ginsing, beer, etc., No soda Ib lub cawv mo, ib lu cawv txheeb ntawg 1 small pack rice with a small peice of meat, wrapped together 1 noob ncoob 1 bundle of incense, ib pob xyaab ib tsuag ntawv Give nyaj ntxhais vauv $40 and If you have not given nyaj tsaav ntuj, then give $20 notes There are two types of noob ncoob Rha - with designes in the middle Lab - just red center request cob tshaav ntuj remember to give them half the meat afterwards. In our case we just give him the whole thing, because we live far. Request Qeej you have to ask him to xyuas xau pour him one small cup of beer and ask him to paab tshuab qeej xyuas xau You should also give this person some of the meat. If you go as a group one person can give him the meat and the another person can give the other person his ua thug cob tshaav ntug tsua tug ntxhais vauv cawv txheej ntawg 1. Make sure the people you are representing have all their items. Take all the items to the table where they are writting this infomation. Give one of the drinks to the people at this table this is the cawv su . The other is the cawv txheej ntawg. (I think they also take the ntawv from you) Take this cawv along with the mov and nqaj for each couple you are representing to the cuab tsaav to ntawg cawv and mov nqaj. Pour one cup for the cuaj tsaav and ask him to ntawg cawv and mov nqaj for each couple, remember to pour him one cup for each couple. Nua yog ntxhais vauv (person's name) lub cawv txheej ntawg (He will drink it and proceed to ntawg the cawv, mov nqaj) Pour the rest of the drink to the family of the deceased (Tsev tsom cuab) , ask them to help drink tug tsais vauv lug cawv. Wait for the rooj su, they will call you to sit at the table at which time they will thank you and will drink the cawv su. Then at the end of the night the event call ncej xub qeeg, they will call the names of the ntxhas vauv in which case you will need to go and answer. They will say tug nxthais vauv ( Person's name ) ncej qeeg txhug koj lawm When you go up they will had you one cawv and say saam saib los yog koj, seem saib los yog koj ca txai cawv moog haus verse and a qeej and say saam saib los yog koj, seem saib los yog koj ca txai qeej moog tshuab verse2 The first thing you say is tsi yog kuv, (impling that you don't want song, tsi yuav zaaj) If you don't want them to has zaaj then you say If you want them to \"has zaaj\" then, when you go up you say tsi yog kuv le. Yog koj yig yig, then they know you want a zaaj. Then they will say zaaj paj qeeg When this is done you will say \"tsuav yog mej txiv qeej txiv nruag mej tas yog saam saib los yog kuv, seem saib los yog kuv, kev neeb kev tsaav tu sab los nyob txwj mej??? nawb\" verse 3, then except the qeej and the cawv If you don't know how to tshuaj qeej, then give the nyaj noob qais to the txiv qeej and tell him you don't know how to tshuaj mej meej tshuaj."

        "url": "vangkin_live\\qeej\\previous_notes.htm",
        "description": "Qeej OLD Notes that still need to be organized Intro / Instructions There is 4 tshooj, then sau (end) which ended the Dee, Then you blow your zaaj (personal song) Then you blow first half of dee sau, Then blow zaaj again Then you blow first half of dee sau along with the second half of dee Sau. This is the complete first cycle. You blow this cycle a total of 3 times. This is what people blow at the funeral during downtime when guest blows their personal zaaj. When u have never blown qeej and don’t know what to listen for, than it seems like they are blowing everything different but actually, it’s just a repetition of 1 to 2 things only. Currently, mark has tshooj 1,2,3, and sau, and is in the process of learning a zaaj. Then last thing he needs is dee sau first half and second half then he would be able to blow at the funeral. When you blow tshooj 1,2,3,4 and sau, then u don’t repeat those anymore You go into your zaaj, dee sau first half, zaaj, dee sau first half and second half to end (sau) Jump right into zaaj, dee sau 1st half, zaaj, dee sau 2nd half to sau Last round jump into zaaj again, dee sai 1st half, zaaj, dee sau 2nd half to sau Notes sheet Color Codes black is single notes blue is inhale exhale red is tab let go yellow is double tab and hold Audio Example of first few notes ❮❮ Play pause ❯❯ Your browser does not support the video. Your browser does not support the video. Your browser does not support the video. Your browser does not support the video. Your browser does not support the video. Audio Example of first few notes ❮❮ Play pause ❯❯ Your browser does not support the video. Your browser does not support the video. Your browser does not support the video. Your browser does not support the video. Your browser does not support the video."

    {
        "url": "vangkin_live\\qeej\\qeej.htm",
        "description": "Learning Qeej Definitions : note(s) in this context is in references to a musical note Start the learning process by beginning with the basic tshooj Tshooj 1 followed by Tshooj 2 then the last part sau (ending) When blowing the qeej, this is the order of which you will preform. This process is called Qeej Noob Nrw Zaaj (song), Ntiv Sau first half Zaaj, then Ntiv Sau first and second to end the first round Zaaj (song), Ntiv Sau first half Zaaj, then Ntiv Sau first and second to end the second round Zaaj (song), Ntiv Sau first half Zaaj, then Ntiv Sau first and second to end the third round The zaaj is your own personal zaaj short or long. You blow the same zaaj all three rounds. The ntiv tshooj 1 and 2 are \"only\" blown at the very beginning. Summary Ntiv qeej (Tshooj 1, 2 and Xaus) Zaaj Ntiv Xaus (1 and 2) How to read the qeej notes sheet Click here to see an example qeej notes sheet Each box is broken into 6 sections. Each seperate section represents a key hole on the qeej. The entire box is considered one qeej note, unless it has a blue section which then the box is considered two notes. figure 1 click to see bigger image Figure 2 When referring to the right side or left side of the qeej descriptions below, imagine you have the qeej in front of you and your about to blow into it. Your right hand will be holding the right side of the qeej and your left hand the left side of the qeej. Then imagine the 6 section box in front of you. Each section is a corrisponding key hole on the qeej. refer to figure 1 above The top right box (number 1) equals the top key on the qeej's right side. The middle right box (number 2) equals the middle key on the qeej's right side. The bottom right box (number 3) equals the bottom key on the qeej's right side. The top left box (number 4) equals the top key on the qeej's left side. The middle left box (number 5) equals the middle key on on the qeej's left side. The bottom left box (number 6) equals the bottom key on your left side. In the example in figure 1 above, you would press and hold the bottom right key hole and the middle left key hold and blow this note. The chart below indentifies each color, symbol and what to do for each one tap means you press and let go quickly Don't press, leave hole open two breaths - in and out or out and in. when a box is blue, there are two notes in this box. press and hold † Quickly tap once ŦQuickly tap twice & hold A red and blue line at the top of the note indicates change in breathing. Either blowing in and out or out and in. A purple line at the bottom of a note indicates you need to make a faster transition between these two notes, ie.. blow faster between these two notes The name of each hole of the qeej using the the number system above here is the name of each hole (ntiv) of the qeej Number 1 right hand thumb peice is called Ntiv luav Number 2 right hand pointing finger piece is called Ntiv txhug Number 3 right hand middle finger piece is called Ntiv Xeem also called Ntiv laig Number 4 left hand thumb peice is called Ntiv twb Number 5 left hand pointing finger piece is called Ntiv npug Number 6 left hand middle finger piece is called Ntiv puj also called Ntiv ruj / Ntiv Nuj Inside the Qeej Inside the Qeej is this piece called the nplaim which is cut inside the qeej that producings the sound of the piece (ntiv)"

        "url": "vangkin_live\\wedding\\cawv_rooj_tshoob.htm",
        "description": "When a Daughter is married When a son is married This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. Thare are many xeej cawv so if you really want to drink you can go through all of them. But there are a few that are very important and should probably never be skipped. These are marked with the asteriks * tug chiv cawv : the person(s) who will decide on the types of cups that will be drank at the wedding ceremony Depending the wedding, this can be the kaav xwm, the txiv txum mej koob, or two people could be asked to head the table and detemine these. xeej cawv poob plaag * xeej cawv txhwj/txheeb qhua * xeej cawv hloov ntxuag xeej cawv huam xwm (when a pig is offered Need more info on this one) last I spoke to Lug Pov, he said this one is not needed even if pig??? xeej cawv paam thaaj * xeej cawv tshaab thaaj (Use the larger glass cup)* xeej cawv tshais xeej cawv sawv kev ( Do you use the larger glass cup for this one?) * xeej cawv Txais tub txais nyaab xeej cawv Ua Tsaug xeej cawv Nkaws lug, Just as the Chiv cawv announces this cup, and before the drinking begins, the mej koob will speak of the wedding and what the in-laws said, then the chiv cawv drink then rest of table lift the cup and say nub nua mej moog tov lug lawm es seb nam txiv muaj lug ab tsws los has rua peb noog. If the is only one mej khoob, then you give the other pair to the phis laaj See more details in meeting 20 (cawv tam txiv tuam mej koom, cawv nkaws lug, other cawv (2document)) xeej cawv Tam Mej Koob Explain to me by Lug Pov, Some people think this one and the one above are the same one and uses the names inter changeably. Some people drink this one instead of the one above. For this one just as the Chiv Cawv announces the cup, a big cup is first poured for the Mej Koob and he drinks first. He will also speak of the wedding and what the in-laws said, then the chiv cawv drink then rest of table lub nuav yog lub xeej cawv Tam Mej Koob es muab cob rua txiv tuam mej koob es meb haus tuaj. xeej cawv zoo sab (Use the big cup), Before drinking this one, the mother and father drinks first, they can say a few words, then moves on to the Chiv Cawv. When this reaches the end of the table, the two at the end of the table passes it on to the older brother. Chob rua tug tij laug."
    },
    {
        "url": "vangkin_live\\wedding\\items_material.htm",
        "description": "Items & Materials needed for the Wedding This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. When a son is getting married phuam txoos suab two are needed They are needed to tie on the heads of the vauv and phis laaj ?????? Can someone provide an image ?????? Umbrella It should be a new umbrella never used before, mid to long size embrella with a J shape handle, it should also be solid black Suav Ceeb also pronounced Sawv Ceeb Used to tie around the Umbrella Kawm (Hmoob Basket) Blanket a small one that can fit into the Hmoob basket should be fine. A knife with sheath Best if you can have a mini Hmong knife and sheath Two spoons Best if you can have a mini Hmong knife and sheath When you go to the bride parents you bring two. The they are suppose to put those away and when you come back home after the wedding the bride's family is suppose to give you 4 new ones for you to bring back home. One Small bottle of cooking oil One Small bottle of salt Hmoob Rice Bag with Cooked Rice 4 chicken for Hmoob ntsuab and 5 for Hmoob dlawb 2 is for the lunch while going to the bride's parents house (noj su). For Hmoob ntsuab the other 2 are used for when you first get to the bride's house and you set the table to gather the family to eat and drink in prepration for the wedding discussion. For Hmoob dlawb the 2 chicken is used after the wedding discussion is finish and the time to \"noj mov ntse dlej\" For Hmoob dlawb one chicken is the qab npawg poj , also known as the qab laig dlaab ?????? So should be bring 5 chicken ???? reference meeting 08/07/2022 15. Chickens needed reference meeting 08/07/2022 14. Items & Materials Notes about the lunch Make sure you bring items needed for the lunch like water bottle. Important that you save the chicken feet to show the brides family. Do not discard the feet. When a daughter is getting married"

        "url": "vangkin_live\\wedding\\new_bride_lwm_qab.htm",
        "description": "New Bride, Lawm Qab This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. When to bring a bride home It is believe that the best time to bring home a bride is during the newest moon. The best month is between the 1st through to 6ht month of the new year. The best day is between the 1st to the 15th. Some also believe that the married will have better luck if the wedding on an even year like 2000 2002, 2004 Reference class session 02/16/2020 Lwm qab when your son first brings his bride home. You will need to perform this step before allowing the new person into your house. You can use 1 incense (ib tug xyaab), but its best to use a hen. Lwm defined from class session : ❮❮ Play pause ❯❯ We do this to so that no bad spirits or bad luck or spirits of the new brides side of the family follow her into the husbands house. To block these items from coming along with her We also do this so the new couple can start a good life togther by blessing them and giving them luck Explained in Hmong ❮❮ Play pause ❯❯ We use a hen because it is believed that it has the power to block these bad things (mentioned above). We use the incense as it is belived the words you say while burning the incense will happen as it is being said. ❮❮ Play pause ❯❯ We use a Hen instead of a Roster as our elders believe using a hen creates a better life for the husband and wife ❮❮ Play pause ❯❯ If your using the incense (xyaab) make sure it is lite. The important thing is the burning fume (paa nchu) that the incense gives off. Have the couple stand side by side just outside the front door facing the front door. The husband should be on the right side and the wife on the left. Based on your postion facing them from inside the house. To Add reference from 04/03/2022 meeting With the hen you will say the following while using the hen to go around the body from the top of their head to their feet. Note : Since the son is bringing the new daughter into the family to start their life together, Start with the son then move onto the daughter. Auv nub nua yog ib nub dlawb nub zoo Tug tub(Npe) coj tau tug nyaab (Npe) lug ua nwg puj nwg sev ► play Kuv yog vaaj tshaab koob tom xwm ► play mas kuv muab tug puj qab kua taw luaj ku dlav nwg paub lawm ntuj sav ► play nwg kua taw luaj ku rawg nwg paub lawm ntuj zug ► play mas kuv muab nwg lug quas lug taav dlaab neej tsaa dlaab peg dlaab ntxaug dlaab ntxoog dlaab tsu rov qaab moog rua nwg vaaj nwg tsev. ► play Puj qab ncaws lis to tej dlaab phem dlaab tsi zoo rov lis hlo, ► play puj qab ncaws lis tawv dlaab neej tsaa dlaab phem dlaab tsi zoo kom rov lis zawv. ► play Kuv muab tug puj qab nuav quas nkau tuaj nruab nraab ► play mas dlaab neej tsaa dlaab txeeg dlaab qus soj tsim pum nwg qaab ► play kuv muab tug puj qab nuav quas nkaus nwg kev ► play mas kom dlaab neej tsaa dlaab txeeg dlaab qus ► play soj tsi pum nwg cev ntaag auv. ► play Full phrase ❮❮ play pause ❯❯ If you are using an incense instead of a hen, you switch some of the words with these ► play Next you have the couple come inside the house just inside the door frame and while facing the inside of the house and you say the following... Auv nub nua tub (npe) coj tau nyaab(npe) lug ua nwg tug nam tsev mas nwg yuav coj ► play plig nyaj plig kub plig tub plig kiv kev muaj txag nplua nuj kev txawj kev ntse ► play kev nom kev tswv kev caj vaaj caj fwv lug ► play Mas Nam txiv ncej dlaab ncej qhua Xwm Kaab Txhaj Meej Pem Xeeb ► play yuav qaws quas zog tug nyaab nuav ntsuj dluab ntsuj plig nyuj raag caab kau ► play ntsuj dluab ntsuj hlau lug rua vaaj rua tsev ► play kom lug ua neej nyob fuam vaam fuam txhaij muaj koob nto npe ntaag auv. ► play fuam vaam fuam txhaj change to fuam vaam fuam txhaij Reference class session 08/24/2022 for more details, 15. fuam txhaj fuam txaib Full phrase ❮❮ play pause ❯❯ After you are done with the 2nd phrase. If you used the hen then bring it into the house for a few moments before letting it go If you used the incense you can leave it standing at your front door or leave it with your Xwm Kaab. The Xwm Kaab is the overall seer in your household so putting the incense there will help the Xwm Kaab ecknowledge the new person (leeg paub). Putting it at the front door translates to the door continuing to block the bad luck bad spirits etc.. More details ❮❮ Play pause ❯❯ Reference class session 05/22/2022 for more details and discussion Old material from previous meeting auv nub nua tug tub coj tug nyaab lug txug nua lawm mab muab tug qab nuav lug lwm mas quas kev neej kev tsaav kev phem kev tsi zoo lug txug nuav los muab lwm kuas tsov qaab moog vaaj moog tsev nawv txawm yog dlaab neej tsaav dlaab ub dlaab nua kev phem kev tsi zoo lug txug yaag kev yaag ncua es lawv qaab txug nuav los nub nua muab tug qab nuav lug lwm mas quas kom kev neej kev tsaav kev phem kev tsi zoo kev mo kev nkeeg kev chawj kev chim tsov qaab tig tswv moog nawv, mas xob ntsug nwg lug peb tsi yuav lawm es tig tswv moog nawv ❮❮ Play pause ❯❯ Corrections : kev chawj kev chim Phrase 2 Nub nua lub txug nuav mas muab tug qab nuav tsoog nwg tug ntsuj tug dluab tug ntsuj tug plig coj nwg lug vaaj lug tsev mas yuav lug ua txwj ua nkawm ua tub ua nyaab lug mas kom dlaab rooj taag mas qov rooj taag rooj txua ncej dlaab ncej qhua, xwm kaab txhaj meej pem xeej mas qheb rooj rua mas coj nwg lug vaaj lug tsev lug nyoj ib txaag ib laa, ib vaaj ib tsev yuav lug nyoj ib txoog ib qai lug nyoj ib txhab ib txhw ua tub ua nyaab ua nam ua txiv rua (parent's name) ❮❮ Play pause ❯❯"

    {
        "url": "vangkin_live\\wedding\\positions_duties.htm",
        "description": "This website requires JavaScript, please enable it. Click on this link to learn how to enable Javascript. Positions when a son is getting married Find someone to fullfill these positions Nrhav Txiv Tuam Mej Koob, Lwm Mej Koob, Phis Laaj, Ris Nraa, Nam Ua Luag (nam txais Ntsuab). Txiv Tuam Mej & Lwm Mej Koob - Speakers for the groom's family during the bargaining phase Phis Laaj - Grooms partner, somewhat like the best man, aub lub pob choj The priority is to find someone closely related to the groom. It should be someone who is a younger brother (Kwv or Npawg). Never an older brother. If someone can't be found a friend or son can be used but they must be younger then the groom Ris Nraa - Carries the basket, aub lub Kaum Can be anyone who is willing to help you out Nam Ua Luag (Nam Txais Ntsuab) - female to accompany the brige to never leave her side during the wedding traditionally used to guard the bride so no older boyfriends of other people to try lure her away traditionally this duty falls on one of the grooms unmarried sisters. But can be a female relative Nam Txiv - Can be an uncle or grandparent in relationship to the groom, should never be the grooms parents or direct the role of this position is to represent the parents and answer any question as the parents should. This position can be asked to resolve some issues that may come up if one should come up during the wedding Reference Meeting 08/07/2022 6. Nam Txiv Asking someone to fullfill a position reference meeting 08/07/2022, 11. Asking someone to fullfill a position If you have only asked them to fullfill a position by phone when the person arrives at your house you will need to ask them again to fullfill the position. This time you need to pour a pair of beer (two cups) and ask them properly. Yog xuas lub foos hu xwb nua tes thaum tuaj txug maam laub ib khub cawv rua tes maam rov has dlua le kws yug thov nwg. Position : ► Nam Txiv Asking someone to be a Mej Koob Thov Txiv tuam mej koob person's name, kuv tug tub moog coj tau nyaab lug lawm es xaav thov koj moog paab ua mej koob. Thov phis laaj, ris nraa, nam ua luag tes has tuab yam le nuav xwb. Asking someone to fullfill the other positions When asking someone to fullfill the other positions the words are exactly the same except you change the person's name and position. Thov phis laaj, ris nraa, nam ua luag tes has tuab yam le nuav xwb. person's name, kuv tug tub moog coj tau nyaab lug lawm es xaav thov koj moog paab ua (position). Thov puab nrug coj tub hab nyaab moog xaus tshoob has le nuav After you seat each person with a position at the table give each person a pair of beer (two cups) and folk with meat This is what you say to them Txiv tuam mej koob (npe) nub nua (tug txiv tsev) nwg tsaa nwg ncej tsev muaj tub nwg muab sev ► play nwg txhawb nwg nqaaj nthaab muaj tub nwg muab nyaab. ► play Nwg yuav tso nam ntaab moog ntsawj tsua muv moog ntsawj thoob ► play tsi pum qaab yuav zug yuav yuav koj lub dlaag lub zug ► play coj (tug tub) puab nyuas moog xaus tshoob xaus kug, moog laaj nam laaj txiv ► play yuav muab koj lub plhu txaj plhu ntsig moog ntaiv nub ntaiv hli ► play moog tiv kev ab kev dlaw los thov koj ua sab quas ntev nawv. ► play Full Verse ❮❮ Play pause ❯❯ phis laaj (npe) nub nua (tug txiv tsev) nwg tsaa nwg ncej tsev muaj tub nwg muab sev nwg txhawb nwg nqaaj nthaab muaj tub nwg muab nyaab. Nwg yuav tso nam ntaab moog ntsawj tsua nam muv moog ntsawj thoob tsi pum qaab yuav zug yuav yuav koj lub dlaag lub zug ntsug (tug tub) moog xaus tshoob xaus kug, moog laaj nam laaj txiv yuav muab koj lub plhu txaj plhu ntsig moog ntaiv nub ntaiv hli moog tiv kev ab kev dlaw los thov koj ua sab quas ntev nawv. The rest of the positions you basically say the same words, except you change the poistion name and you say the word \"ntsug\" instead of the word \"coj\". ris nraa (Npe) nub nua (tug txiv tsev) nwg tsaa nwg ncej tsev muaj tub nwg muab sev nwg txhawb nwg nqaaj nthaab muaj tub nwg muab nyaab. Nwg yuav tso nam ntaab moog ntsawj tsua, muv moo ntsawj thoob tsi pum qaab yuav zug yuav yuav koj lub dlaag lub zug ntsug (tug tub) moog xaus tshoob xaus kug, moog laaj nam laaj txiv yuav muab koj lub plhu txaj plhu ntsig moog ntaiv nub ntaiv hli moog tiv kev ab kev dlaw los thov koj ua sab quas ntev nawv. nam ua luag (nam txais ntsuab) (Npe) nub nua (tug txiv tsev) nwg tsaa nwg ncej tsev muaj tub nwg muab sev nwg txhawb nwg nqaaj nthaab muaj tub nwg muab nyaab. Nwg yuav tso nam ntaab moog ntsawj tsua nam muv moog ntsawj thoob tsi pum qaab yuav zug yuav yuav koj lub dlaag lub zug ntsug (tug tub) moog xaus tshoob xaus kug, moog laaj nam laaj txiv yuav muab koj lub plhu txaj plhu ntsig moog ntaiv nub ntaiv hli moog tiv kev ab kev dlaw los thov koj ua sab quas ntev nawv. Once you have addressed each person and postion as mentioned above Then you address all of them at once starting with the Mej Koob. You say the same words as before. And finally you bow to all of them. Thaum yug has rua ib tug ib tug tag tes has ib zag rua taag nrho txhua tug pib txiv tuam mej koob txug rua nam ua luag tes le maam pe. Cob nkauj kaus ► Play muab nam nkauj kaus coj li nkaus koj quas npaaj koj tau nam nkauj kaus roog nam nkauj nyaab txiv tshaug teem swv vau moog sawv kaab muab nam nkauj kaus coj li nkaus koj quas teg koj coj nam nkauj kaus roog nam nkauj nyaab txiv tshaug teem swv vau moog sawv kev vaam koj coj nam nkauj kaus moog tiv tshoob tiv kus tiv neej tiv tsaav tiv ntsuab tiv ze nawb txiv tuam mej koob ► 2nd recording Words said to the Mej Koob before they leave for the bride's house ► Play muaj lug sab lug qeg los koj yeej meem laav muaj yaam kaw yuav tau khu nyaj los koj yeej meem ua rua koj moog ua tau le caag los peb cov nam txiv yeej ua koj tsaug xwb nub nua te peb muab tso pluav rua koj nawb ► Play ► Play Old material from previous meeting Old writeup Postions when a sister is getting married Txiv Txum Mej Koob Tom Nua - Speaker for the daughter's family during the bargaining phase Txiv Tuam Mej Koob Tom u - Speaker for the son in law's family Lwm Mej Koob - the 2nd Mej Koob Speaker for the son in law's family Kaav xwm - Regulates the event during the day of the wedding, prmarily at the wedding table Ntau Qhua Laug / Ntau Nco / Qhua Txiv Qhua laug Yawm Txoos - have to can be a txiv ntxawm or yawm laug Nam Txiv Dlaab Saib Nug tij Tais laug txiv laug (Qhua txiv laug) Cooking and house duties Ob tug tshwj kaab/ua zaub - head chef/cook Ob tug nam ua mov Ob tug Tub tim theej/tub laub cawv - Pours the alchohal during the wedding When pouring the alcohol. While in the front of the table, always remember if you are on the right or left side of the table. Remember that you always pour the right cup first before the left cup. If you are on the right side of the table, you use your left hand to pour. If you are on the left side you must use your right hand. Also remember that when you finish pouring and reach the end of the table. Don't head directly back to the front of the table the way you came, along side the table. You must exit the table at the end and go around the back of the seated people then head back to the front. If you are pouring into a cup and do not fill it all the way you will be required to drink it so always remember to keep you filling kettle full. Other noj nco plwg qhua ► coob_moog_cuag_luag_ntseg_moog_cuag_ntsheeg Ntau Qhua Laug / Ntau Nco / Qhua Txiv Qhua laug Yawm Txoos - have to can be a txiv ntxawm or yawm laug Nam Txiv Dlaab Saib Nug tij Tais laug txiv laug (Qhua txiv laug) Cooking and house duties Ob tug tshwj kaab/ua zaub - head chef/cook Ob tug nam ua mov Ob tug Tub tim theej/tub laub cawv - Pours the alchohal during the wedding When pouring the alcohol. While in the front of the table, always remember if you are on the right or left side of the table. Remember that you always pour the right cup first before the left cup. If you are on the right side of the table, you use your left hand to pour. If you are
